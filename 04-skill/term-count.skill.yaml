name: term_count
version: "1.0"
description: Count occurrences of a term in a document.
action: term_count
inputs:
  term:
    type: string
    required: true
    description: The search term.
  path:
    type: string
    required: true
    description: Path to the document file.
  case_sensitive:
    type: boolean
    required: false
    default: false
    description: Match letter casing exactly.
procedure:
  - Read the file at `path`.
  - Search for `term`, respecting `case_sensitive`.
  - Return a JSON object with the count and matched lines.
output:
  format: json
  fields:
    term:
      type: string
    count:
      type: integer
    matches:
      type: array
validation:
  count_non_negative: true
  matches_length_equals_count: true
